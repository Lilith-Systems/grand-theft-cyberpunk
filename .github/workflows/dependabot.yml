name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Dependabot Auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Enable auto-merge for patch/minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Add label for major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "major-version-update"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run CI on Dependabot PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const checkName = 'ci / test (ubuntu-latest, 3.10)';
            const conclusion = 'success';

            // Wait for CI to complete
            await new Promise(resolve => setTimeout(resolve, 30000));

            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
              check_name: checkName,
            });

            if (checks.check_runs.length > 0) {
              const run = checks.check_runs[0];
              if (run.conclusion === 'success') {
                console.log('CI passed, enabling auto-merge');
              } else if (run.conclusion === 'failure') {
                console.log('CI failed, not auto-merging');
              }
            }