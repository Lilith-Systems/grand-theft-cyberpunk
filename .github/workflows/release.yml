name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Extract version
        id: extract_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
      - name: Build package
        run: python -m build
      - name: Check package with twine
        run: twine check dist/*
      - name: Verify version matches
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          pkg_version = data['project']['version']
          assert pkg_version == VERSION, f'Version mismatch: pyproject.toml={pkg_version}, tag={VERSION}'
          print(f'Version verified: {VERSION}')
          "
      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --pyproject pyproject.toml -o sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  sign:
    name: Sign with Cosign
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign artifacts
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign-blob --yes --bundle dist/*.whl.sig dist/*.whl
          cosign sign-blob --yes --bundle dist/*.tar.gz.sig dist/*.tar.gz
      - name: Generate provenance attestation
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign attest-blob --yes --bundle dist/*.whl.attestation.sig dist/*.whl
          cosign attest-blob --yes --bundle dist/*.tar.gz.attestation.sig dist/*.tar.gz
      - name: Upload signatures and attestations
        uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: dist/*.sig
          retention-days: 90
      - name: Upload attestations
        uses: actions/upload-artifact@v4
        with:
          name: attestations
          path: dist/*.attestation.sig
          retention-days: 90

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sign]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Download signatures
        uses: actions/download-artifact@v4
        with:
          name: signatures
          path: dist/
      - name: Publish to PyPI
        run: |
          python -m pip install --upgrade twine
          twine upload dist/*

  publish-github:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, sign]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Download signatures
        uses: actions/download-artifact@v4
        with:
          name: signatures
          path: dist/
      - name: Download attestations
        uses: actions/download-artifact@v4
        with:
          name: attestations
          path: dist/
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: nvidia-gratitude-driver v${{ needs.build.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/*
            sbom.json
            *.attestation.sig
          generate_release_notes: true