name: Submission Review Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  deterministic-review:
    name: Code, Tests, and Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install review dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff bandit pip-audit
      - name: Generate AI review
        env:
          AI_REVIEW_TOKEN: ${{ github.token }}
          AI_REVIEW_ENDPOINT: https://models.github.ai/inference/chat/completions
          AI_REVIEW_MODEL: openai/gpt-4.1-mini
          REVIEW_BASE: origin/${{ github.base_ref || 'main' }}
        run: python .github/scripts/generate_ai_review.py --output "$RUNNER_TEMP/ai-review.json"
      - name: Run fail-closed submission gate
        env:
          AI_REVIEW_FILE: ${{ runner.temp }}/ai-review.json
        run: python .github/scripts/submission_review_gate.py
